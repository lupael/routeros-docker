services:
    routeros:
        container_name: "routeros"
        image: lupael/routeros:latest
        restart: unless-stopped
        privileged: true
        ports:
            - "22:22" # SSH
            - "80:80" # Web
            - "8291:8291" # Winbox
        cap_add: 
            - NET_ADMIN
        devices: 
            - /dev/net/tun
