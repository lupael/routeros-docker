name: Build and Push Docker Image

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: 'RouterOS version (e.g. 7.9). If empty the action extracts version from git tag.'
        required: false
        default: ''
      release:
        description: 'Create GitHub release when manually run (true/false).'
        required: false
        default: 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from git tags or workflow input
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "Using version from workflow input: '${{ github.event.inputs.version }}'"
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "Extracting version from git tags"
            echo "VERSION=$(git describe --tags --always | cut -d'-' -f1 | sed 's/^v//')" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate RouterOS download URL
        run: |
          URL="https://download.mikrotik.com/routeros/${{ steps.version.outputs.VERSION }}/chr-${{ steps.version.outputs.VERSION }}.vdi.zip"
          echo "Checking: $URL"
          wget --spider "$URL" || { echo "::error::RouterOS version ${{ steps.version.outputs.VERSION }} not found at $URL"; exit 1; }

      - name: Get changelog
        run: curl -s https://download.mikrotik.com/routeros/${{ steps.version.outputs.VERSION }}/CHANGELOG -o CHANGELOG.md

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            lupael/routeros:latest
            lupael/routeros:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            ROUTEROS_VERSION=${{ steps.version.outputs.VERSION }}

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true')
        with:
          body_path: ./CHANGELOG.md
